name: Update Instagram Dashboard

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: install
        run: pip install requests

      - name: fetch and build
        env:
          ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          APP_ID: ${{ secrets.IG_APP_ID }}
          APP_SECRET: ${{ secrets.IG_APP_SECRET }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          ALERT_DAYS: "14"
        run: python fetch.py

      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "auto: update dashboard" || echo "no changes"
          git push
